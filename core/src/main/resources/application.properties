spring.application.name=core
server.port=8080

spring.mongodb.uri=mongodb://localhost:27017/petstore

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

cors.allowed-origins=http://localhost:4200

# Dev-only default (>=256 bits for HS256); override in a real deployment.
petstore.jwt.secret=dev-only-jwt-signing-secret-please-override-in-any-real-deployment-32bytesmin
petstore.jwt.ttl=24h
petstore.seed.admin-password=admin123
