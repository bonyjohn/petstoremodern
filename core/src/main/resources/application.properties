spring.application.name=core
server.port=8080

# directConnection: the local single-node replica set advertises itself as
# localhost; connect to the seed host directly instead of via discovery.
spring.mongodb.uri=mongodb://localhost:27017/petstore?directConnection=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# The Angular dev server's origin.
cors.allowed-origins=http://localhost:4200

# Dev-only default (>=256 bits for HS256); override in a real deployment.
# Must match the fulfillment service's value — it validates the same tokens.
petstore.jwt.secret=e49e69a151d8a6a91900e255221cab5b6bcf90365fb508122291cbc238ba055c
petstore.jwt.ttl=24h
# Password for the seeded admin user (dev default; override in a real deployment).
petstore.seed.admin-password=admin123
# Shared secret for the fulfillment-service shipment callback (prod would use mTLS
# or client-credentials; a static header token keeps local dev honest and simple).
petstore.internal.token=be14b806e14627830578a8d5bef6166d91a68220f31280d1

# Outbound email. EmailSender is ready but not called — Notifier logs instead,
# matching the legacy default. Point these at a real SMTP server when wiring it in.
spring.mail.host=localhost
spring.mail.port=1025
petstore.mail.from=noreply@petstore.example
# No SMTP server runs in dev; don't fail the health endpoint on its connection check.
management.health.mail.enabled=false
