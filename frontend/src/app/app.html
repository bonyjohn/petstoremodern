<p-toolbar styleClass="app-toolbar">
  <div class="p-toolbar-group-start">
    <a routerLink="/" class="app-title"><h1>Pet Store</h1></a>
  </div>
  <div class="p-toolbar-group-end app-toolbar-controls">
    <p-inputgroup class="app-search">
      <input
        pInputText
        type="text"
        placeholder="Search"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
      />
      <p-button icon="pi pi-search" (onClick)="onSearch()" />
    </p-inputgroup>
    <p-select
      [options]="locales"
      [ngModel]="localeService.locale()"
      (ngModelChange)="onLocaleChange($event)"
    />
    <a routerLink="/cart" class="cart-link">
      <p-overlaybadge [value]="cartService.count() ? cartService.count() : undefined" severity="danger">
        <i class="pi pi-shopping-cart" style="font-size: 1.25rem"></i>
      </p-overlaybadge>
    </a>
    @if (authService.isAuthenticated()) {
      <a routerLink="/account" class="account-link">{{ authService.username() }}</a>
      <p-button label="Sign Out" icon="pi pi-sign-out" severity="secondary" (onClick)="onLogout()" />
    } @else {
      <p-button label="Sign In" icon="pi pi-user" routerLink="/login" />
    }
  </div>
</p-toolbar>

<main class="app-container">
  <router-outlet />
</main>
