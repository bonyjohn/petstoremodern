spring.application.name=fulfillment-service
server.port=8081

# Same database as core — the collections are the contract between the services.
# directConnection: the local single-node replica set advertises itself as
# localhost; connect to the seed host directly instead of via discovery.
spring.mongodb.uri=mongodb://localhost:27017/petstore?directConnection=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Where shipment callbacks are POSTed.
petstore.core.url=http://localhost:8080
# Shared secret for the shipment callback to core; must match core's value.
petstore.internal.token=dev-internal-token
# Same HS256 secret as core so admin JWTs issued there validate here too.
# Duplicating the value (and the JWT config class) across services is deliberate:
# the services share nothing but the token format and the database.
petstore.jwt.secret=dev-only-jwt-signing-secret-please-override-in-any-real-deployment-32bytesmin
